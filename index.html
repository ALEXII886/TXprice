<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車資計算機</title>
    <!-- 為了離線時避免預設字體不好看，可以加入基礎 fallback font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 淺色柔和主題 */
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --bg-input: #f1f5f9;
            --border-color: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --btn-bg: #f1f5f9;
            --btn-hover: #e2e8f0;
            --success-color: #059669; /* 稍微深一點的綠色，適合淺色背景 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* 加入了系統字體當作無網路時的 fallback */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 3rem;
        }

        .calculator-container {
            width: 100%;
            max-width: 440px;
            padding: 0 16px;
            padding-bottom: 2rem;
        }

        .calc-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .calc-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
            color: var(--text-primary);
        }

        .calc-header .subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .calc-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        .input-section {
            margin-bottom: 1.5rem;
        }

        .input-section label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        /* 左右切換按鈕樣式 */
        .region-toggle {
            display: flex;
            background-color: var(--bg-input);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 0.35rem;
            margin-bottom: 1rem;
        }

        .region-btn {
            flex: 1;
            background-color: transparent;
            color: var(--text-secondary);
            border: none;
            padding: 0.75rem 0;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .region-btn:hover {
            color: var(--text-primary);
        }

        .region-btn.active {
            background-color: var(--accent-color);
            color: #ffffff;
            box-shadow: 0 2px 4px rgba(59,130,246,0.3);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            margin-bottom: 0.75rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .icon {
            font-size: 1.25rem;
            margin-right: 0.75rem;
            color: var(--text-secondary);
        }

        input[type="number"] {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.1rem;
            width: 100%;
            outline: none;
        }

        input[type="number"]::placeholder {
            color: #94a3b8;
        }

        /* 隱藏預設的上下箭頭 */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        .reset-btn {
            width: 100%;
            background-color: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.875rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        .reset-btn:hover {
            background-color: var(--btn-hover);
            color: var(--text-primary);
        }

        .result-area {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .result-row:last-child {
            margin-bottom: 0;
        }

        .result-label {
            font-size: 1.1rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        .driver-label {
            color: var(--success-color);
            font-size: 0.95rem;
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .total-price {
            color: var(--text-primary);
        }

        .driver-income {
            color: var(--success-color);
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <header class="calc-header">
            <h2>車資計算機</h2>
            <p class="subtitle" id="fare-subtitle">基本 85 元 (含1.2km) ｜ 每公里 25 元 ｜ 每分鐘 3.7 元</p>
        </header>

        <div class="calc-card">
            <!-- 選擇地區 -->
            <div class="input-section">
                <div class="region-toggle">
                    <button class="region-btn active" data-region="taipei">台北</button>
                    <button class="region-btn" data-region="taoyuan">桃園</button>
                </div>
            </div>

            <!-- 預估時間 -->
            <div class="input-section" style="margin-bottom: 1rem;">
                <label>預估時間 (分鐘)</label>
                <div class="input-wrapper" style="margin-bottom: 0;">
                    <span class="icon">⏱️</span>
                    <input type="number" id="time-input" placeholder="例如：15" min="0" step="1">
                </div>
            </div>

            <!-- 行駛距離 -->
            <div class="input-section" style="margin-bottom: 1.5rem;">
                <label>行駛距離 (公里)</label>
                <div class="input-wrapper" style="margin-bottom: 0;">
                    <span class="icon">📍</span>
                    <input type="number" id="distance-input" placeholder="例如：5.2" min="0" step="0.1">
                </div>
            </div>

            <button class="reset-btn" id="reset-btn">🔄 清除歸零</button>

            <div class="result-area">
                <div class="result-row">
                    <span class="result-label">總價</span>
                    <span class="result-value total-price" id="total-price">$0</span>
                </div>
                <div class="result-row">
                    <span class="result-label driver-label">司機實得 (扣除 25% 平台費)</span>
                    <span class="result-value driver-income" id="driver-income">$0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const regionBtns = document.querySelectorAll('.region-btn');
            const fareSubtitle = document.getElementById('fare-subtitle');
            const timeInput = document.getElementById('time-input');
            const distanceInput = document.getElementById('distance-input');
            const totalPriceEl = document.getElementById('total-price');
            const driverIncomeEl = document.getElementById('driver-income');
            const resetBtn = document.getElementById('reset-btn');

            let currentRegion = 'taipei';

            // 定義各區費率
            const rates = {
                taipei: { baseFare: 85, baseDist: 1.2, perKm: 25, perMin: 3.7 },
                taoyuan: { baseFare: 90, baseDist: 1.2, perKm: 25, perMin: 1.7 }
            };

            // 計算車資
            const calculateFare = () => {
                const time = parseFloat(timeInput.value) || 0;
                const distance = parseFloat(distanceInput.value) || 0;
                const rate = rates[currentRegion];

                let total = 0;
                
                if (distance > 0 || time > 0) {
                    // 基本費
                    let distanceFee = rate.baseFare;
                    
                    // 超過基本距離的部分，每公里收取指定費用
                    if (distance > rate.baseDist) {
                        distanceFee += (distance - rate.baseDist) * rate.perKm;
                    }

                    // 時間費 (每分鐘)
                    let timeFee = time * rate.perMin;
                    
                    total = distanceFee + timeFee;
                }

                // 平台抽成 25%，司機實得 75%
                const driverIncome = total * 0.75;

                // 更新顯示，四捨五入到整數
                totalPriceEl.textContent = `$${Math.round(total).toLocaleString()}`;
                driverIncomeEl.textContent = `$${Math.round(driverIncome).toLocaleString()}`;
            };

            // 綁定輸入事件
            timeInput.addEventListener('input', calculateFare);
            distanceInput.addEventListener('input', calculateFare);

            // 切換地區按鈕事件
            regionBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    // 移除所有按鈕的 active 狀態
                    regionBtns.forEach(b => b.classList.remove('active'));
                    // 為點擊的按鈕加入 active 狀態
                    btn.classList.add('active');
                    
                    // 更新目前選擇的地區
                    currentRegion = btn.dataset.region;
                    const rate = rates[currentRegion];
                    
                    // 更新上方提示文字
                    fareSubtitle.textContent = `基本 ${rate.baseFare} 元 (含${rate.baseDist}km) ｜ 每公里 ${rate.perKm} 元 ｜ 每分鐘 ${rate.perMin} 元`;
                    // 重新計算車資
                    calculateFare();
                });
            });

            // 歸零按鈕
            resetBtn.addEventListener('click', () => {
                timeInput.value = '';
                distanceInput.value = '';
                calculateFare();
            });
        });
    </script>
</body>
</html>

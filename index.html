<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車資計算機</title>
    <!-- 為了離線時避免預設字體不好看，可以加入基礎 fallback font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 淺色柔和主題 */
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --bg-input: #f1f5f9;
            --border-color: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --btn-bg: #f1f5f9;
            --btn-hover: #e2e8f0;
            --success-color: #059669; /* 稍微深一點的綠色，適合淺色背景 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* 加入了系統字體當作無網路時的 fallback */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 3rem;
        }

        .calculator-container {
            width: 100%;
            max-width: 440px;
            padding: 0 16px;
            padding-bottom: 2rem;
        }

        .calc-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .calc-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
            color: var(--text-primary);
        }

        .calc-header .subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .calc-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        .input-section {
            margin-bottom: 1.5rem;
        }

        .input-section label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        /* 左右切換按鈕樣式 */
        .region-toggle {
            display: flex;
            background-color: var(--bg-input);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 0.35rem;
            margin-bottom: 1rem;
        }

        .region-btn {
            flex: 1;
            background-color: transparent;
            color: var(--text-secondary);
            border: none;
            padding: 0.75rem 0;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .region-btn:hover {
            color: var(--text-primary);
        }

        .region-btn.active {
            background-color: var(--accent-color);
            color: #ffffff;
            box-shadow: 0 2px 4px rgba(59,130,246,0.3);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            margin-bottom: 0.75rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .icon {
            font-size: 1.25rem;
            margin-right: 0.75rem;
            color: var(--text-secondary);
        }

        input[type="number"] {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.1rem;
            width: 100%;
            outline: none;
        }

        input[type="number"]::placeholder {
            color: #94a3b8;
        }

        /* 隱藏預設的上下箭頭 */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        .reset-btn {
            width: 100%;
            background-color: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.875rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        .reset-btn:hover {
            background-color: var(--btn-hover);
            color: var(--text-primary);
        }

        .toggle-btn {
            width: 100%;
            background-color: var(--bg-input);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.875rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .toggle-btn.active {
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--accent-color);
            border-color: var(--accent-color);
        }

        .result-area {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .result-row:last-child {
            margin-bottom: 0;
        }

        .result-label {
            font-size: 1.1rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        .driver-label {
            color: var(--success-color);
            font-size: 0.95rem;
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .total-price {
            color: var(--text-primary);
        }

        .driver-income {
            color: var(--success-color);
        }

        /* 頁面切換按鈕樣式 */
        .tab-toggle {
            display: flex;
            background-color: var(--bg-input);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 0.35rem;
            margin: 1rem auto;
            max-width: 300px;
        }

        .tab-btn {
            flex: 1;
            background-color: transparent;
            color: var(--text-secondary);
            border: none;
            padding: 0.75rem 0;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: var(--text-primary);
        }

        .tab-btn.active {
            background-color: var(--accent-color);
            color: #ffffff;
            box-shadow: 0 2px 4px rgba(59,130,246,0.3);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .income-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .income-row label {
            font-size: 1rem;
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 0;
            flex: 1;
        }

        .income-input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .income-input-wrapper:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .income-input-wrapper span {
            color: var(--text-secondary);
            margin-right: 0.5rem;
        }

        .income-input-wrapper input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.1rem;
            width: 100%;
            outline: none;
            text-align: right;
        }

        /* 隱藏元素用 */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <header class="calc-header">
            <h2>車資計算機</h2>
            <div class="tab-toggle">
                <button class="tab-btn active" data-target="page-calc">計算機</button>
                <button class="tab-btn" data-target="page-income">總收入</button>
            </div>
            <p class="subtitle" id="fare-subtitle">基本 85 元 (含1.2km) ｜ 每公里 25 元 ｜ 每分鐘 3.7 元</p>
        </header>

        <div id="page-calc" class="calc-card">
            <!-- 選擇地區 -->
            <div class="input-section">
                <div class="region-toggle">
                    <button class="region-btn active" data-region="taipei">台北</button>
                    <button class="region-btn" data-region="taoyuan">桃園</button>
                </div>
            </div>

            <!-- 預估時間 -->
            <div class="input-section" style="margin-bottom: 1rem;">
                <label>預估時間 (分鐘)</label>
                <div class="input-wrapper" style="margin-bottom: 0;">
                    <span class="icon">⏱️</span>
                    <input type="number" id="time-input" placeholder="例如：15" min="0" step="1">
                </div>
            </div>

            <!-- 行駛距離 -->
            <div class="input-section" style="margin-bottom: 1.5rem;">
                <label>行駛距離 (公里)</label>
                <div class="input-wrapper" style="margin-bottom: 0;">
                    <span class="icon">📍</span>
                    <input type="number" id="distance-input" placeholder="例如：5.2" min="0" step="0.1">
                </div>
            </div>

            <!-- 加成金額 -->
            <div class="input-section" style="margin-bottom: 1.5rem;">
                <label>加成金額 (元)</label>
                <div class="input-wrapper" style="margin-bottom: 0;">
                    <span class="icon">💰</span>
                    <input type="number" id="surcharge-input" placeholder="例如：50" min="0" step="1">
                </div>
            </div>

            <!-- 夜間加成 (僅台北) -->
            <button type="button" id="night-btn" class="toggle-btn">
                <span>🌙</span> 啟用夜間加成 (+20元)
            </button>

            <button class="reset-btn" id="reset-btn">🔄 清除歸零</button>

            <div class="result-area">
                <div class="result-row">
                    <span class="result-label">總價</span>
                    <span class="result-value total-price" id="total-price">$0</span>
                </div>
                <div class="result-row">
                    <span class="result-label driver-label">司機實得 (扣除 25% 平台費)</span>
                    <span class="result-value driver-income" id="driver-income">$0</span>
                </div>
            </div>
        </div>

        <div id="page-income" class="calc-card hidden">
            <div class="input-section">
                <div class="income-row">
                    <label>UBER</label>
                    <div class="income-input-wrapper">
                        <span>$</span>
                        <input type="number" id="income-uber" class="income-input" placeholder="0" min="0">
                    </div>
                </div>
                <div class="income-row">
                    <label>BOLT</label>
                    <div class="income-input-wrapper">
                        <span>$</span>
                        <input type="number" id="income-bolt" class="income-input" placeholder="0" min="0">
                    </div>
                </div>
                <div class="income-row">
                    <label>台灣大車隊</label>
                    <div class="income-input-wrapper">
                        <span>$</span>
                        <input type="number" id="income-taiwan" class="income-input" placeholder="0" min="0">
                    </div>
                </div>
                <div class="income-row">
                    <label>YOXI</label>
                    <div class="income-input-wrapper">
                        <span>$</span>
                        <input type="number" id="income-yoxi" class="income-input" placeholder="0" min="0">
                    </div>
                </div>
                <div class="income-row">
                    <label>LINE GO</label>
                    <div class="income-input-wrapper">
                        <span>$</span>
                        <input type="number" id="income-linego" class="income-input" placeholder="0" min="0">
                    </div>
                </div>
                <div class="income-row">
                    <label>路招</label>
                    <div class="income-input-wrapper">
                        <span>$</span>
                        <input type="number" id="income-street" class="income-input" placeholder="0" min="0">
                    </div>
                </div>
            </div>

            <button class="reset-btn" id="income-reset-btn">🔄 清除歸零</button>

            <div class="result-area">
                <div class="result-row">
                    <span class="result-label">總計</span>
                    <span class="result-value" id="display-total-income" style="color: #8b5cf6;">$0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const regionBtns = document.querySelectorAll('.region-btn');
            const fareSubtitle = document.getElementById('fare-subtitle');
            const timeInput = document.getElementById('time-input');
            const distanceInput = document.getElementById('distance-input');
            const totalPriceEl = document.getElementById('total-price');
            const driverIncomeEl = document.getElementById('driver-income');
            const resetBtn = document.getElementById('reset-btn');
            const surchargeInput = document.getElementById('surcharge-input');
            const nightBtn = document.getElementById('night-btn');

            let currentRegion = 'taipei';
            let isNightSurcharge = false;

            // 定義各區費率
            const rates = {
                taipei: { baseFare: 85, baseDist: 1.2, perKm: 25, perMin: 3.7 },
                taoyuan: { baseFare: 90, baseDist: 1.2, perKm: 25, perMin: 1.7 }
            };

            // 計算車資
            const calculateFare = () => {
                const time = parseFloat(timeInput.value) || 0;
                const distance = parseFloat(distanceInput.value) || 0;
                const surcharge = parseFloat(surchargeInput.value) || 0;
                const rate = rates[currentRegion];

                let total = 0;
                
                if (distance > 0 || time > 0 || surcharge > 0 || isNightSurcharge) {
                    // 基本費
                    let distanceFee = rate.baseFare;
                    
                    // 超過基本距離的部分，每公里收取指定費用
                    if (distance > rate.baseDist) {
                        distanceFee += (distance - rate.baseDist) * rate.perKm;
                    }

                    // 時間費 (每分鐘)
                    let timeFee = time * rate.perMin;
                    
                    total = distanceFee + timeFee + surcharge;
                    
                    if (currentRegion === 'taipei' && isNightSurcharge) {
                        total += 20;
                    }
                }

                // 平台抽成 25%，司機實得 75%
                const driverIncome = total * 0.75;

                // 更新顯示，四捨五入到整數
                totalPriceEl.textContent = `$${Math.round(total).toLocaleString()}`;
                driverIncomeEl.textContent = `$${Math.round(driverIncome).toLocaleString()}`;
            };

            // 綁定輸入事件
            timeInput.addEventListener('input', calculateFare);
            distanceInput.addEventListener('input', calculateFare);
            surchargeInput.addEventListener('input', calculateFare);
            
            // 夜間加成事件
            nightBtn.addEventListener('click', () => {
                isNightSurcharge = !isNightSurcharge;
                if (isNightSurcharge) {
                    nightBtn.classList.add('active');
                } else {
                    nightBtn.classList.remove('active');
                }
                calculateFare();
            });

            // 切換地區按鈕事件
            regionBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    // 移除所有按鈕的 active 狀態
                    regionBtns.forEach(b => b.classList.remove('active'));
                    // 為點擊的按鈕加入 active 狀態
                    btn.classList.add('active');
                    
                    // 更新目前選擇的地區
                    currentRegion = btn.dataset.region;
                    const rate = rates[currentRegion];
                    
                    if (currentRegion === 'taipei') {
                        nightBtn.style.display = 'flex';
                    } else {
                        nightBtn.style.display = 'none';
                        isNightSurcharge = false;
                        nightBtn.classList.remove('active');
                    }
                    
                    // 更新上方提示文字
                    fareSubtitle.textContent = `基本 ${rate.baseFare} 元 (含${rate.baseDist}km) ｜ 每公里 ${rate.perKm} 元 ｜ 每分鐘 ${rate.perMin} 元`;
                    // 重新計算車資
                    calculateFare();
                });
            });

            // 歸零按鈕
            resetBtn.addEventListener('click', () => {
                timeInput.value = '';
                distanceInput.value = '';
                surchargeInput.value = '';
                isNightSurcharge = false;
                nightBtn.classList.remove('active');
                calculateFare();
            });

            // 頁面切換邏輯
            const tabBtns = document.querySelectorAll('.tab-btn');
            const pageCalc = document.getElementById('page-calc');
            const pageIncome = document.getElementById('page-income');

            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    tabBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    if (btn.dataset.target === 'page-calc') {
                        pageCalc.classList.remove('hidden');
                        pageIncome.classList.add('hidden');
                        fareSubtitle.style.visibility = 'visible'; // 顯示原本的副標題
                        fareSubtitle.style.display = 'block';
                    } else {
                        pageCalc.classList.add('hidden');
                        pageIncome.classList.remove('hidden');
                        fareSubtitle.style.visibility = 'hidden'; // 隱藏原本的副標題，保留高度
                        fareSubtitle.style.display = 'none'; // 讓出空間，更簡潔
                    }
                });
            });

            // 總收入計算邏輯
            const incomeInputs = document.querySelectorAll('.income-input');
            const displayTotalIncome = document.getElementById('display-total-income');
            const incomeResetBtn = document.getElementById('income-reset-btn');

            const calculateTotalIncome = () => {
                const uber = parseFloat(document.getElementById('income-uber').value) || 0;
                const bolt = parseFloat(document.getElementById('income-bolt').value) || 0;
                const taiwan = parseFloat(document.getElementById('income-taiwan').value) || 0;
                const yoxi = parseFloat(document.getElementById('income-yoxi').value) || 0;
                const linego = parseFloat(document.getElementById('income-linego').value) || 0;
                const street = parseFloat(document.getElementById('income-street').value) || 0;

                // 台灣大車隊扣除 15% (0.85)，YOXI 扣除 12% (0.88)，LINE GO 扣除 17% (0.83)
                const total = Math.round(uber + bolt + (taiwan * 0.85) + (yoxi * 0.88) + (linego * 0.83) + street);
                displayTotalIncome.textContent = `$${total.toLocaleString()}`;
            };

            incomeInputs.forEach(input => {
                input.addEventListener('input', calculateTotalIncome);
            });

            // 總收入歸零按鈕
            incomeResetBtn.addEventListener('click', () => {
                incomeInputs.forEach(input => input.value = '');
                calculateTotalIncome();
            });
        });
    </script>
</body>
</html>
